<body class="page bg-linear-to-br from-500 to-900" x-data="{ tab: 'local-data' }">

  <!-- Prerender test nav — no x-route, appears on every prerendered page -->
  <nav class="row gap-3 p-2 text-sm border-b border-line" style="background: var(--color-surface-2, #f5f5f5); flex-wrap: wrap" data-order="0">
    <strong style="opacity:0.5">en:</strong>
    <a href="/">Accueil</a>
    <a href="/about">About</a>
    <a href="/products/widget">Widget</a>
    <a href="/blog">Blog</a>
    <span style="opacity:0.3">|</span>
    <strong style="opacity:0.5">fr:</strong>
    <a href="/fr/about">About</a>
    <a href="/fr/products/widget">Widget</a>
    <a href="/fr/blog">Blog</a>
    <span style="opacity:0.3">|</span>
    <strong style="opacity:0.5">es:</strong>
    <a href="/es/about">About</a>
    <a href="/es/products/widget">Widget</a>
    <a href="/es/blog">Blog</a>
  </nav>

  <!-- Root route: full dev harness -->
  

  <!-- About route: localized content + data-hydrate island -->
  

  <!-- Products wildcard route: dynamic per-URL content via $route('path') -->
  <section x-route="products/*" style="padding: 2rem; max-width: 640px; margin: 0px auto; flex-direction: column; gap: 1.5rem" data-order="3">
    <h1 x-text="$x.products.$route('path').name || 'Product'">Gadget</h1>
    <p>Category: <strong x-text="$x.products.$route('path').category">Electronics</strong></p>
    <p>Price: <strong x-text="'$' + ($x.products.$route('path').price || '?')">$19.99</strong></p>
    <p x-text="$x.products.$route('path').description">High-quality gadget with advanced features</p>
    <a href="/">← Back to Accueil</a>
  </section>

  <!-- Blog route: static x-for list (baked for SEO in prerender output) -->
  

  <!-- 404 route -->
  

  <!-- Popup test: data-hydrate scope propagation (webchat pattern) -->
  <div class="fixed bottom-10 end-10 z-100" x-data="{ showChannels: false }" style="position:fixed; bottom:2.5rem; right:2.5rem; z-index:100" data-order="6" data-component="popup-1">

    <!-- Popup button A — data-hydrate with conditional classes -->
    <a role="button" href="#popup-a" class="absolute bottom-0 start-0 brand shadow-lg transition-all duration-300" :class="showChannels ? 'bottom-36 opacity-100' : 'bottom-0 opacity-0 pointer-events-none'" data-hydrate="" style="position:absolute; bottom:0; left:0">Popup A</a>

    <!-- Popup button B — data-hydrate with conditional classes -->
    <button class="absolute bottom-0 start-0 brand shadow-lg transition-all duration-300" :class="showChannels ? 'bottom-18 opacity-100' : 'bottom-0 opacity-0 pointer-events-none'" data-hydrate="" style="position:absolute; bottom:0; left:0">Popup B</button>

    <!-- Toggle button — must also be hydrate-protected (sibling in x-data scope) -->
    <button @click="showChannels = !showChannels" style="padding:0.5rem 1rem; cursor:pointer">Toggle Channels</button>

</div>
