<!-- Popup test: data-hydrate on children inside a local x-data scope.
     Tests that hydrate marking propagates to the parent x-data element and its
     descendants (including the toggle button with @click), so Alpine conditional
     classes take effect at runtime.  -->
<div class="fixed bottom-10 end-10 z-100" x-data="{ showChannels: false }" style="position:fixed; bottom:2.5rem; right:2.5rem; z-index:100">

    <!-- Popup button A — data-hydrate with conditional classes -->
    <a role="button" href="#popup-a"
       class="absolute bottom-0 start-0 brand shadow-lg transition-all duration-300"
       :class="showChannels ? 'bottom-36 opacity-100' : 'bottom-0 opacity-0 pointer-events-none'"
       data-hydrate
       style="position:absolute; bottom:0; left:0">Popup A</a>

    <!-- Popup button B — data-hydrate with conditional classes -->
    <button class="absolute bottom-0 start-0 brand shadow-lg transition-all duration-300"
            :class="showChannels ? 'bottom-18 opacity-100' : 'bottom-0 opacity-0 pointer-events-none'"
            data-hydrate
            style="position:absolute; bottom:0; left:0">Popup B</button>

    <!-- Toggle button — must also be hydrate-protected (sibling in x-data scope) -->
    <button @click="showChannels = !showChannels"
            style="padding:0.5rem 1rem; cursor:pointer">Toggle Channels</button>

</div>
