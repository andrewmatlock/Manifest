<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Web -->
  <title>Project Name</title>
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <meta name="google" content="notranslate">
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- Web App & Manifest -->
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="/manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="/manifest.theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mnfst@0.5.34/dist/manifest.min.css">

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/mnfst@0.5.34/dist/manifest.min.js" data-tailwind data-version="0.5.34"></script>

</head>

<!-- Page class applies classic web/app layout -->

<body class="page">

  <!-- Localized SEO Head content -->
  <template data-head>
    <meta name="author" :content="$x.manifest.author">
    <meta name="description" :content="$x.content.description">
    <meta property="og:title" :content="$x.manifest.name">
    <meta property="og:description" :content="$x.content.description">
    <meta property="og:url" :content="$x.manifest.live_url">
    <meta property="og:site_name" :content="$x.manifest.name">
    <meta property="og:image:alt" :content="$x.manifest.name">
    <meta property="og:image" content="/icons/opengraph.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en-us">
  </template>

  <!-- header.html component -->
  <x-header></x-header>

  <!-- Content area -->
  <main class="[&>section]:py-10">

    <x-test-localization x-route="test"></x-test-localization>

    <!-- Home -->
    <section x-route="/" class="prose w-full mb-40" x-markdown="README.md"></section>

    <!-- Page 1 -->
    <section x-route="page-1">
      <h1 x-text="$x.content.page1">Page 1</h1>
    </section>

    <!-- Page 2 -->
    <section x-route="page-2">
      <h1 x-text="$x.content.page2">Page 2</h1>
    </section>

    <!-- License -->
    <section x-route="license" class="prose w-full mb-40" x-markdown="LICENSE.md"></section>

    <!-- Privacy -->
    <section x-route="privacy" class="prose w-full mb-40" x-markdown="privacy.md"></section>

    <!-- 404 -->
    <section x-route="!*">
      <h1 x-text="$x.content.notFound">404 Page Not Found</h1>
    </section>

  </main>

  <!-- footer.html component -->
  <x-footer></x-footer>

</body>

</html>
