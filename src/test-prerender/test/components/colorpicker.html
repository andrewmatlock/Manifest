<!-- Trigger button (standard x-dropdown) -->
<button x-dropdown="colorpicker" class="colorpicker-swatch"></button>

<!-- Color picker (x-colorpicker on the menu, x-dropdown handles open/close) -->
<menu popover id="colorpicker" class="colorpicker" x-colorpicker x-data="{ tab: 'solid' }">

    <!-- Hidden input for form participation -->
    <input type="color" value="#f97316" hidden />

    <!-- Tabs -->
    <div class="row">
        <button class="sm ghost" :class="tab === 'solid' && 'selected'" @click="tab = 'solid'" x-icon="lucide:square" x-tooltip="Solid" aria-label="Solid"></button>
        <button class="sm ghost" :class="tab === 'gradient' && 'selected'" @click="tab = 'gradient'" x-icon="lucide:blend" x-tooltip="Gradient" aria-label="Gradient"></button>
        <button class="sm ghost me-auto" :class="tab === 'library' && 'selected'" @click="tab = 'library'" x-icon="lucide:swatch-book" x-tooltip="Library" aria-label="Library"></button>
        <button class="eyedropper sm ghost" x-icon="lucide:pipette"></button>
    </div>

    <hr>

    <!-- Gradient layers section -->
    <div class="p-3" x-show="tab === 'gradient'">
        <div class="row justify-between items-center gap-2">
            <span class="text-xs text-content-neutral">Gradient</span>
            <button class="gradient-add-layer sm ghost" x-icon="lucide:plus" x-tooltip="Add gradient layer" aria-label="Add gradient layer"></button>
        </div>
        <!-- <div class="gradient-layers"></div> -->

        <!-- Layer template (cloned per layer by the plugin) -->
        <template class="gradient-layer">
            <div class="row items-center gap-2">
                <button class="sm ghost flex-1" x-dropdown="gradient-options">
                    <span x-icon="lucide:square-dashed"></span>
                </button>
                <menu popover id="gradient-options">
                    <li data-type="linear"><span x-icon="lucide:square-dashed"></span><span>Linear</span></li>
                    <li data-type="radial"><span x-icon="lucide:circle-dashed"></span><span>Radial</span></li>
                    <li data-type="conic"><span x-icon="lucide:triangle-dashed"></span><span>Conic</span></li>
                    <hr>
                    <li class="layer-duplicate">Duplicate</li>
                    <li class="layer-remove negative">Remove</li>
                </menu>
                <div class="gradient-layer grow"></div>
                <label class="layer-angle"><input type="number" class="sm" min="0" max="360" /><span>&deg;</span></label>
                <menu class="layer-angle-menu">
                    <li class="layer-rotate">Rotate 90&deg;</li>
                    <li class="layer-flip">Flip Direction</li>
                </menu>
            </div>
        </template>
    </div>

    <hr x-show="tab === 'gradient'">

    <!-- Canvas -->
    <canvas x-show="tab !== 'library'"></canvas>

    <!-- Solid color controls -->
    <div class="color-controls" x-show="tab !== 'library'">
        <input type="range" class="hue" />
        <input type="range" class="alpha" />

        <div class="row gap-1 w-full">
            <div role="group" class="grow">
                <select class="color-format sm">
                    <option value="hex">Hex</option>
                    <option value="rgb">RGB</option>
                    <option value="hsl">HSL</option>
                    <option value="oklch">OKLCH</option>
                </select>
                <input type="text" class="color-value sm" onClick="this.select()" />
            </div>
            <input type="number" class="alpha-value sm" min="0" max="100" step="1" onClick="this.select()" />
        </div>
    </div>

    <!-- Library (swatches) -->
    <div class="swatches" x-show="tab === 'library'">
        <span data-color="#ef4444" style="background:#ef4444"></span>
        <span data-color="#f97316" style="background:#f97316"></span>
        <span data-color="#eab308" style="background:#eab308"></span>
        <span data-color="#22c55e" style="background:#22c55e"></span>
        <span data-color="#3b82f6" style="background:#3b82f6"></span>
        <span data-color="#8b5cf6" style="background:#8b5cf6"></span>
        <span data-color="#ec4899" style="background:#ec4899"></span>
        <span data-color="#000000" style="background:#000000"></span>
        <span data-color="#ffffff" style="background:#ffffff"></span>
    </div>

</menu>
